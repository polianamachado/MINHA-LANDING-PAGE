<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poliana Machado</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --red: #8B0000;
    --green: #2D8C00;
    --green-hover: #3aad00;
    --dark: #0a0a0a;
    --gray-btn: #1e1e1e;
    --gray-btn-hover: #2a2a2a;
    --text: #ffffff;
    --text-muted: #888;
  }

  html, body {
    height: 100%;
    background: #000000;
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    overflow-x: hidden;
  }

  /* ---- LAYOUT ---- */
  .page {
    min-height: 100vh;
    display: flex;
    align-items: stretch;
    position: relative;
  }

  /* ---- HERO PHOTO (DESKTOP: right side) ---- */
  .photo-col {
    position: fixed;
    right: 0;
    top: 0;
    width: 52%;
    height: 100vh;
    pointer-events: none;
    z-index: 0;
    background: #5c0c19;
  }

  .photo-col::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to right, #000000 0%, transparent 35%),
                linear-gradient(to top, #000000 0%, transparent 25%);
    z-index: 1;
  }

  .photo-col img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
    mix-blend-mode: normal;
    filter: contrast(1.05) brightness(0.9);
  }

  /* Red glow behind photo */
  .photo-glow {
    display: none;
  }

  /* ---- CONTENT LEFT ---- */
  .content-col {
    position: relative;
    z-index: 10;
    width: 52%;
    max-width: 580px;
    padding: 64px 56px 64px 56px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-height: 100vh;
  }

  /* Label */
  .label {
    font-family: 'Barlow', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.1s forwards;
  }

  /* Name */
  .name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: clamp(72px, 9vw, 110px);
    line-height: 0.88;
    text-transform: uppercase;
    letter-spacing: -0.01em;
    color: #fff;
    opacity: 0;
    animation: fadeUp 0.7s ease 0.2s forwards;
  }

  .name span {
    display: block;
  }

  /* Bio */
  .bio {
    font-size: 15px;
    font-weight: 300;
    line-height: 1.6;
    color: #aaa;
    margin-top: 24px;
    max-width: 380px;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.4s forwards;
  }

  /* Divider */
  .divider {
    width: 48px;
    height: 2px;
    background: var(--red);
    margin: 32px 0;
    opacity: 0;
    animation: fadeUp 0.5s ease 0.5s forwards;
  }

  /* Buttons */
  .buttons {
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: 420px;
    opacity: 0;
    animation: fadeUp 0.7s ease 0.6s forwards;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 18px 28px;
    border-radius: 100px;
    text-decoration: none;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: transform 0.2s ease, filter 0.2s ease, box-shadow 0.2s ease;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    border: none;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.2s ease;
  }

  .btn:hover::after {
    background: rgba(255,255,255,0.07);
  }

  .btn:hover {
    transform: translateY(-2px);
  }

  /* Primary - WhatsApp */
  .btn-primary {
    background: var(--green);
    color: #fff;
    box-shadow: 0 4px 30px #2D8C0044;
  }

  .btn-primary:hover {
    filter: brightness(1.15);
    box-shadow: 0 8px 40px #2D8C0066;
  }

  .btn-sub {
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.2em;
    opacity: 0.8;
    display: block;
    font-family: 'Barlow', sans-serif;
    text-transform: uppercase;
    margin-top: 1px;
  }

  .btn-text-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Secondary - locked */
  .btn-locked {
    background: var(--gray-btn);
    color: #555;
    border: 1px solid #2a2a2a;
    cursor: not-allowed;
  }

  .btn-locked:hover {
    transform: none;
    filter: none;
    box-shadow: none;
  }

  .btn-locked::after { display: none; }

  .lock-icon {
    width: 16px;
    height: 16px;
    opacity: 0.4;
    flex-shrink: 0;
  }

  /* WA Icon */
  .wa-icon {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
  }

  /* ---- ANIMATIONS ---- */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ---- MOBILE ---- */
  @media (max-width: 768px) {
    .page { flex-direction: column; }

    .photo-col {
      position: relative;
      width: 100%;
      height: 60vw;
      max-height: 380px;
      min-height: 260px;
    }

    .photo-col::before {
      background:
        linear-gradient(to top, #000000 0%, transparent 40%),
        linear-gradient(to bottom, #000000 0%, transparent 15%);
    }

    .photo-col img {
      object-position: center 10%;
    }

    .content-col {
      width: 100%;
      max-width: 100%;
      padding: 0 24px 56px 24px;
      min-height: auto;
      justify-content: flex-start;
      margin-top: -60px;
    }

    .name {
      font-size: clamp(64px, 18vw, 90px);
    }

    .bio {
      max-width: 100%;
    }

    .buttons {
      max-width: 100%;
    }
  }
</style>
</head>
